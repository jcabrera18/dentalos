# ── railway.toml ─────────────────────────────────────────────
# Deploy to Railway with: railway up
# https://railway.app

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "node dist/server.js"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "dentalos-api"
