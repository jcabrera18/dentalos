<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e1e"/>
      <stop offset="100%" style="stop-color:#111111"/>
    </linearGradient>
    <linearGradient id="toothGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#d8e8f5"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4da8f0"/>
      <stop offset="100%" style="stop-color:#2b8fd6"/>
    </linearGradient>
  </defs>

  <!-- Fondo redondeado -->
  <rect width="32" height="32" rx="7" fill="url(#bgGrad)"/>

  <!-- Diente estilizado -->
  <!-- Cuerpo principal del diente -->
  <path d="
    M10,8
    C10,7 11,6 12.5,6
    C13.5,6 14.5,6.8 16,6.8
    C17.5,6.8 18.5,6 19.5,6
    C21,6 22,7 22,8
    C22,10 21.5,12 21,14
    C20.5,16.5 20,19 19.5,21
    C19.2,22.5 18.5,23 18,23
    C17.5,23 17,22 16.8,21
    C16.5,19.5 16,18 16,18
    C16,18 15.5,19.5 15.2,21
    C15,22 14.5,23 14,23
    C13.5,23 12.8,22.5 12.5,21
    C12,19 11.5,16.5 11,14
    C10.5,12 10,10 10,8
    Z
  " fill="url(#toothGrad)"/>

  <!-- Línea de acento azul en la base del cuello del diente -->
  <rect x="10" y="13" width="12" height="2" rx="1" fill="url(#accentGrad)" opacity="0.7"/>

  <!-- Punto azul pequeño arriba a la derecha (indicador OS / tech) -->
  <circle cx="23.5" cy="8.5" r="3" fill="url(#accentGrad)"/>
</svg>
